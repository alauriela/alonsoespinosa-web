name: Build and Deploy Jekyll with Timezone

on:
  push:
    branches: [ "main" ] # O "master" si ese es tu branch principal
  workflow_dispatch:

env:
  TZ: Europe/Madrid # <-- Esto es CLAVE

permissions:
  contents: write
  pages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v4
      - uses: actions/setup-ruby@v1
        with:
          ruby-version: '3.1'
      - run: gem install bundler
      - run: bundle install
      - name: Build the site
        run: bundle exec jekyll build --future
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
          with:
            path: ./_site

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/deploy-pages@v4
