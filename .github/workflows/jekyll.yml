# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

# Sample workflow for building and deploying a Jekyll site to GitHub Pages
name: Deploy Jekyll site to Pages

on:
  # Se ejecuta al hacer push a la rama principal
  push:
    branches: ["main"]

  # Permite ejecutar el flujo manualmente desde la pestaña Actions
  workflow_dispatch:

  # SECCIÓN AÑADIDA: Se ejecuta todos los días a las 08:00 AM UTC
  # Esto permite que los posts con fecha futura se publiquen automáticamente
  schedule:
    - cron: '0 8 * * *'

# Configura los permisos del GITHUB_TOKEN
permissions:
  contents: read
  pages: write
  id-token: write

# Permite solo un despliegue simultáneo
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Trabajo de construcción
  build:
    runs-on: ubuntu-latest
    env:
      TZ: Europe/Madrid       
      PAGES_REPO_NWO: alauriela/alonsoespinosa-web 
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Ruby
        uses: ruby/setup-ruby@4a9ddd6f338a97768b8006bf671dfbad383215f4
        with:
          ruby-version: '3.1'
          bundler-cache: true
          cache-version: 0
      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5
      - name: Build with Jekyll
        run: bundle exec jekyll build --baseurl "${{ steps.pages.outputs.base_path }}"
        env:
          JEKYLL_ENV: production
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  # Trabajo de despliegue
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
