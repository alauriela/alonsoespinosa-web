<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }} · Alonso & Espinosa</title>
  <link rel="icon" type="image/png" href="{{ site.baseurl }}/favicon.png">
  <style>
    :root{
      --bg:#f4f7f9;
      --card:#ffffff;
      --text:#1a1a1a;
      --muted:#6b6b6b;
      --accent:#2E4A5A;
      --celeste:#5AD1E5;
    }
    body{font-family:'DM Sans',sans-serif;background:var(--bg);margin:0;padding:0;line-height:1.6}
    .wrap{max-width:800px;margin:0 auto;padding:40px 20px}
    h1{font-family:'Lora',serif;color:var(--accent)}
    .post-meta{color:var(--muted);font-size:14px;margin-bottom:30px}
    .content p{margin-bottom:20px}
    .back{display:inline-block;margin-bottom:30px;color:var(--accent);text-decoration:none}
    footer{margin-top:60px;padding-top:20px;border-top:1px solid #ddd;font-size:13px;color:var(--muted)}
  </style>
</head>
<body>
<div class="wrap">
  <a href="{{ site.baseurl }}/blog.html" class="back">← Volver al blog</a>
  <h1>{{ page.title }}</h1>
  <div class="post-meta">📅 {{ page.date | date: "%d %B %Y" }} · ✍️ Por Alonso & Espinosa</div>
  
  <div class="content">
    {{ content }}
  </div>
  
  <footer>
    <p>Alonso & Espinosa · Consultoría Operativa</p>
  </footer>
</div>
</body>
</html>
